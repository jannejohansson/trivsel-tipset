<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivseltipset — VM 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="favicon.ico">

<style>
  :root {
    --bg:        #0d1117;
    --card:      #161b25;
    --border:    #222b3a;
    --fg:        #f0f2f5;
    --fg-dim:    #6b7a90;
    --gold:      #e8b84b;
    --gold-soft: rgba(232,184,75,0.12);
    --green:     #3ecf74;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: safe center;
    min-height: 100vh;
    padding: 60px 24px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 560px;
    width: 100%;
    text-align: center;
    animation: rise 0.9s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .presenter {
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg-dim);
    font-weight: 400;
    margin-bottom: 20px;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--gold-soft);
    border: 1px solid rgba(232,184,75,0.25);
    border-radius: 100px;
    padding: 5px 14px 5px 10px;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--gold);
    margin-bottom: 28px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 12vw, 88px);
    line-height: 0.95;
    letter-spacing: 0.02em;
    color: var(--fg);
    margin-bottom: 20px;
  }
  h1 span { color: var(--gold); }

  .sub {
    font-size: 16px;
    font-weight: 300;
    color: var(--fg-dim);
    line-height: 1.7;
    margin-bottom: 48px;
    text-wrap: pretty;
  }

  .countdown {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 52px;
  }
  .cd-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .cd-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(38px, 8vw, 58px);
    line-height: 1;
    color: var(--fg);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: clamp(72px, 18vw, 96px);
    text-align: center;
    padding: 14px 0 10px;
  }
  .cd-lbl {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg-dim);
  }
  .cd-sep {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    line-height: 1;
    color: var(--border);
    padding-bottom: 26px;
    align-self: flex-end;
  }

  .signup {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
  }
  .input-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 420px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .signup input {
    flex: 1;
    min-width: 200px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--fg);
    outline: none;
    transition: border-color 0.2s;
  }
  .signup input::placeholder { color: var(--fg-dim); }
  .signup input:focus { border-color: rgba(232,184,75,0.5); }
  .signup button {
    background: var(--gold);
    color: #1a1200;
    border: none;
    border-radius: 10px;
    padding: 13px 26px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .signup button:hover  { opacity: 0.88; transform: scale(1.02); }
  .signup button:active { transform: scale(0.97); }
  .signup-success {
    display: none;
    gap: 8px;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 500;
    color: var(--green);
  }

  footer {
    font-size: 12px;
    color: #5a6375;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div class="page">

  <div class="presenter">Torsdagsklubben presenterar</div>

  <div class="status">
    <div class="status-dot"></div>
    Lanseras inför VM 2026
  </div>

  <h1>VM-Tipset <span>2026</span></h1>

  <p class="sub">Tippa matchresultat, klättra på topplistan och utmana dina vänner — allt automatiskt.</p>

  <div class="countdown">
    <div class="cd-unit">
      <div class="cd-val" id="cd-days">--</div>
      <div class="cd-lbl">Dagar</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-unit">
      <div class="cd-val" id="cd-hours">--</div>
      <div class="cd-lbl">Timmar</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-unit">
      <div class="cd-val" id="cd-mins">--</div>
      <div class="cd-lbl">Minuter</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-unit">
      <div class="cd-val" id="cd-secs">--</div>
      <div class="cd-lbl">Sekunder</div>
    </div>
  </div>

  <div class="signup">
    <div class="input-row" id="signup-row">
      <input type="email" id="email-input" placeholder="din@epost.se" autocomplete="email">
      <button onclick="handleSignup()">Håll mig uppdaterad</button>
    </div>
    <div class="signup-success" id="signup-success">
      <span style="font-size:18px">✓</span> Du är med på listan!
    </div>
  </div>

  <footer>© 2026 Trivseltipset &nbsp;·&nbsp; VM startar 11 juni 2026</footer>

</div>

<script>
function tick() {
  const target = new Date('2026-06-11T18:00:00Z');
  const diff = target - Date.now();
  if (diff <= 0) return;
  const pad = n => String(Math.floor(n)).padStart(2, '0');
  document.getElementById('cd-days').textContent  = pad(diff / 86400000);
  document.getElementById('cd-hours').textContent = pad((diff % 86400000) / 3600000);
  document.getElementById('cd-mins').textContent  = pad((diff % 3600000) / 60000);
  document.getElementById('cd-secs').textContent  = pad((diff % 60000) / 1000);
}
tick();
setInterval(tick, 1000);

function handleSignup() {
  const inp = document.getElementById('email-input');
  if (!inp.value.trim().includes('@')) {
    inp.style.borderColor = '#e84b4b';
    setTimeout(() => inp.style.borderColor = '', 1200);
    return;
  }
  document.getElementById('signup-row').style.display = 'none';
  document.getElementById('signup-success').style.display = 'flex';
}
document.getElementById('email-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSignup();
});
</script>
</body>
</html>
