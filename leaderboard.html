<!DOCTYPE html>
<html class="dark" lang="sv">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Leaderboard | Trivseltipset</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-primary": "#003909", "on-error-container": "#ffdad6", "on-primary-fixed": "#002204",
          "inverse-on-surface": "#313030", "on-tertiary-fixed": "#001945", "background": "#131313",
          "surface-container-low": "#1c1b1b", "on-surface-variant": "#c0c9bb", "surface-tint": "#88d982",
          "tertiary-fixed-dim": "#b0c6ff", "surface-bright": "#393939", "outline": "#8a9386",
          "primary": "#88d982", "on-tertiary-fixed-variant": "#00429c", "secondary": "#e9c349",
          "error-container": "#93000a", "on-tertiary-container": "#adc4ff", "inverse-surface": "#e5e2e1",
          "on-background": "#e5e2e1", "primary-fixed-dim": "#88d982", "on-tertiary": "#002d6f",
          "surface-container-lowest": "#0e0e0e", "surface-container-highest": "#353534",
          "tertiary-fixed": "#d9e2ff", "on-secondary": "#3c2f00", "on-secondary-fixed-variant": "#574500",
          "tertiary-container": "#184da7", "surface-dim": "#131313", "on-error": "#690005",
          "surface-variant": "#353534", "primary-fixed": "#a3f69c", "outline-variant": "#41493e",
          "surface-container-high": "#2a2a2a", "secondary-container": "#af8d11", "error": "#ffb4ab",
          "secondary-fixed": "#ffe088", "secondary-fixed-dim": "#e9c349", "surface-container": "#201f1f",
          "on-primary-fixed-variant": "#005312", "on-secondary-fixed": "#241a00",
          "on-secondary-container": "#342800", "primary-container": "#065f18", "tertiary": "#b0c6ff",
          "inverse-primary": "#1b6d24", "surface": "#131313", "on-primary-container": "#86d881",
          "on-surface": "#e5e2e1"
        },
        fontFamily: { "headline": ["Lexend"], "body": ["Plus Jakarta Sans"], "label": ["Plus Jakarta Sans"] },
        borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">

<!-- Nav -->
<nav class="bg-[#131313]/80 backdrop-blur-xl top-0 sticky z-50 border-b border-outline-variant/20">
  <div class="flex justify-between items-center w-full px-4 md:px-6 py-4 max-w-screen-2xl mx-auto">
    <a href="index.html" class="text-xl font-black italic tracking-tighter text-secondary font-headline">Trivseltipset</a>
    <div class="hidden md:flex gap-8 items-center font-headline tracking-tight text-sm">
      <a class="text-on-surface/60 hover:text-primary transition-colors duration-300" href="matches.html">MATCHER</a>
      <a class="text-primary font-bold" href="leaderboard.html">LEADERBOARD</a>
    </div>
    <div class="flex items-center gap-3">
      <span id="user-display" class="text-on-surface/50 text-xs uppercase tracking-widest hidden md:block"></span>
      <button id="logout-btn" class="text-on-surface/40 hover:text-error text-xs uppercase tracking-widest transition-colors duration-200">
        Logga ut
      </button>
    </div>
  </div>
</nav>

<!-- Main -->
<main class="flex-1 flex items-center justify-center px-4 py-20">
  <div class="text-center max-w-sm">
    <span class="material-symbols-outlined text-7xl text-secondary block mb-6" style="font-variation-settings:'FILL' 1,'wght' 400">emoji_events</span>
    <h1 class="font-headline text-3xl font-black italic tracking-tighter text-on-surface mb-3">Leaderboard</h1>
    <p class="text-on-surface/50 text-sm leading-relaxed mb-8">Poängen beräknas när matcherna är spelade.<br/>Håll utkik under VM!</p>
    <a href="matches.html" class="inline-flex items-center gap-2 bg-primary-container text-on-primary-container px-6 py-3 rounded-lg text-sm font-bold tracking-widest uppercase hover:opacity-80 active:scale-95 transition-all duration-200">
      <span class="material-symbols-outlined text-base">sports_soccer</span>
      Gå till matcher
    </a>
  </div>
</main>

<!-- Footer -->
<footer class="bg-[#131313] py-8 border-t border-outline-variant/20">
  <div class="flex justify-center px-8">
    <p class="text-xs uppercase tracking-widest text-on-surface/40">© 2026 Torsdagsklubben</p>
  </div>
</footer>

<script>
(function () {
  const token = localStorage.getItem('auth_token');
  if (!token) { window.location.href = 'login.html'; return; }

  const userRaw = localStorage.getItem('auth_user');
  try {
    const user = JSON.parse(userRaw);
    if (user && user.displayName) {
      document.getElementById('user-display').textContent = user.displayName;
    }
  } catch {}

  document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.removeItem('auth_token');
    localStorage.removeItem('auth_user');
    window.location.href = 'login.html';
  });
})();
</script>
</body>
</html>
